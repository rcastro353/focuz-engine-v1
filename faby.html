<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dinamic-title">Focuz Shop</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://rcastro353.github.io/focuz-engine-v1/style.css">
</head>
<body>
    <div id="hero" class="hero"></div>
    <div class="container text-center mb-4"><h2 class="fw-bold" id="brand-name">Conectando...</h2></div>
    
    <div class="container">
        <div class="input-group mb-4 shadow-sm rounded-pill overflow-hidden bg-white">
            <span class="input-group-text border-0 bg-white ps-4"><i class="fas fa-search text-muted"></i></span>
            <input type="text" id="search" class="form-control border-0 py-3" placeholder="¿Qué buscas?" oninput="window.filtrar()">
        </div>
        <div id="categories" class="d-flex overflow-auto gap-2 mb-4 pb-2" style="scrollbar-width: none;"></div>
        <div id="productos" class="row g-3">
            <div class="text-center py-5">
                <div class="spinner-border text-success"></div>
                <p>Cargando inventario...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="detalleModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content p-3 shadow-lg rounded-4 border-0">
                <div class="row">
                    <div class="col-md-6 text-center">
                        <img id="det-img-main" src="" class="img-main-detail mb-3">
                        <div id="det-thumbs" class="d-flex gap-2 justify-content-center overflow-auto"></div>
                    </div>
                    <div class="col-md-6 pt-3 pt-md-0">
                        <button type="button" class="btn-close float-end" data-bs-dismiss="modal"></button>
                        <h2 id="det-name" class="fw-bold mb-1"></h2>
                        <div id="det-code" class="fw-bold small text-muted mb-2"></div>
                        <h3 id="det-price" class="text-success fw-bold mb-3"></h3>
                        <div id="det-selector-area" class="mb-3"></div>
                        <div class="bg-light p-3 rounded-4 mb-3">
                            <h6 class="fw-bold small mb-1">Descripción:</h6>
                            <p id="det-desc" class="small mb-0 text-secondary" style="white-space: pre-line;"></p>
                        </div>
                        <button id="det-btn-add" class="btn btn-main w-100 py-3 mt-2 shadow-sm fw-bold">AGREGAR AL CARRITO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="cart-float fw-bold" data-bs-toggle="offcanvas" data-bs-target="#cart">🛒 <span id="c-count">0</span> | <span id="c-total">C$ 0</span></button>
    <div class="offcanvas offcanvas-end rounded-start-4 shadow" id="cart">
        <div class="offcanvas-header border-bottom"><h5 class="fw-bold mb-0">Mi Pedido</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body">
            <div id="cart-list"></div>
            <div class="mt-4 pt-3 border-top text-center">
                <h3 class="fw-bold mb-3">Total: <span class="text-success" id="total-val">0</span></h3>
                <button class="btn btn-main w-100 py-3 mb-2 fw-bold" onclick="window.enviarWhatsApp()">WHATSAPP</button>
                <button class="btn btn-link text-danger w-100 btn-sm text-decoration-none" onclick="window.vaciarCarrito()">Vaciar</button>
            </div>
        </div>
    </div>
<div class="container text-center mt-5 mb-3">
        <div class="social-icons" id="socials"></div>
    </div>

    <footer class="text-center py-3" style="border-top: 1px solid #eee; background-color: #f9f9f9;">
        <a href="https://wa.me/50581536640?text=Hola!%20Me%20interesa%20hacer%20crecer%20mi%20emprendimiento" 
           target="_blank" 
           class="d-block small text-decoration-none fw-bold" 
           style="color: var(--p-color); font-size: 0.75rem; letter-spacing: 0.5px;">
           © Powered by Focuz Design 🚀 Info: 8153-6640
        </a>
    </footer>
  

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        function arrancarTienda() {
            console.log("Iniciando motor...");
            if(typeof window.initFocuz === 'function') {
                window.initFocuz(
                    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlwaE3TzTvO2bQpPsv-MZVB6PCvVVh26eLSg5lYZD7H8DX0ElN_iQajf0pOKZ4Ih7pSmugeCPkyf1-/pub?gid=2048870662&single=true&output=csv",
                    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlwaE3TzTvO2bQpPsv-MZVB6PCvVVh26eLSg5lYZD7H8DX0ElN_iQajf0pOKZ4Ih7pSmugeCPkyf1-/pub?gid=1511626760&single=true&output=csv"
                );
            } else {
                console.error("No se encontró initFocuz. Reintentando...");
                setTimeout(arrancarTienda, 1000);
            }
        }
    </script>

    <script src="https://rcastro353.github.io/focuz-engine-v1/engine.js" onload="arrancarTienda()"></script>
</body>
</html>
