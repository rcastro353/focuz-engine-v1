<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dinamic-title">Focuz Shop</title>

    <!-- FAVICON (fallback inicial) -->
    <link id="favicon" rel="icon" href="https://cdn-icons-png.flaticon.com/512/263/263115.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://rcastro353.github.io/focuz-engine-v1/style.css">

    <style>
        :root {
            --p-color: #198754;
        }

        .error-box {
            background: #fff5f5;
            border: 1px solid #f5c2c7;
            color: #842029;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
        }

        .loading-box {
            text-align: center;
            padding: 3rem 1rem;
        }
    </style>
</head>
<body>

    <div id="hero" class="hero"></div>

    <div class="container text-center mb-4">
        <h2 class="fw-bold" id="brand-name">Conectando...</h2>
    </div>

    <div class="container">
        <div class="input-group mb-4 shadow-sm rounded-pill overflow-hidden bg-white">
            <span class="input-group-text border-0 bg-white ps-4">
                <i class="fas fa-search text-muted"></i>
            </span>
            <input
                type="text"
                id="search"
                class="form-control border-0 py-3"
                placeholder="¿Qué buscas?"
                oninput="if (typeof window.filtrar === 'function') window.filtrar()"
            >
        </div>

        <div id="categories" class="d-flex overflow-auto gap-2 mb-4 pb-2"></div>

        <div id="productos" class="row g-3">
            <div class="loading-box">
                <div class="spinner-border text-success"></div>
                <p class="mt-3 mb-0">Cargando inventario...</p>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="detalleModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content p-3 shadow-lg rounded-4 border-0">
                <div class="row">
                    <div class="col-md-6 text-center">
                        <img id="det-img-main" class="img-main-detail mb-3">
                        <div id="det-thumbs" class="d-flex gap-2 justify-content-center overflow-auto"></div>
                    </div>

                    <div class="col-md-6 pt-3 pt-md-0">
                        <button type="button" class="btn-close float-end" data-bs-dismiss="modal"></button>
                        <h2 id="det-name" class="fw-bold mb-1"></h2>
                        <div id="det-code" class="fw-bold small text-muted mb-2"></div>
                        <h3 id="det-price" class="text-success fw-bold mb-3"></h3>
                        <div id="det-selector-area" class="mb-3"></div>

                        <div class="bg-light p-3 rounded-4 mb-3">
                            <h6 class="fw-bold small mb-1">Descripción:</h6>
                            <p id="det-desc" class="small mb-0 text-secondary"></p>
                        </div>

                        <button id="det-btn-add" class="btn btn-main w-100 py-3 mt-2 fw-bold">
                            AGREGAR AL CARRITO
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTÓN WHATSAPP -->
    <a href="#" id="wa-float-btn" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- CARRITO -->
    <button class="cart-float fw-bold" data-bs-toggle="offcanvas" data-bs-target="#cart">
        🛒 <span id="c-count">0</span> | <span id="c-total">C$ 0</span>
    </button>

    <div class="offcanvas offcanvas-end" id="cart">
        <div class="offcanvas-header border-bottom">
            <h5 class="fw-bold mb-0">Mi Pedido</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
            <div id="cart-list"></div>

            <div class="mt-4 pt-3 border-top text-center">
                <h3 class="fw-bold mb-3">
                    Total: <span id="total-val">0</span>
                </h3>

                <button class="btn btn-main w-100 py-3 mb-2 fw-bold"
                    onclick="if(window.enviarWhatsApp) window.enviarWhatsApp()">
                    WHATSAPP
                </button>

                <button class="btn btn-link text-danger w-100 btn-sm"
                    onclick="if(window.vaciarCarrito) window.vaciarCarrito()">
                    Vaciar
                </button>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="text-center py-3" style="border-top: 1px solid #eee;">
        <a href="https://wa.me/50581536640" target="_blank"
           class="d-block small fw-bold"
           style="color: var(--p-color);">
            © Powered by Focuz Design 🚀
        </a>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const PROD_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV2O8MpV8snD8nUTqLFV2pqu9V86BfmMJcK5CFX50rOc4Xyj8UyqBieK1xNB7KMT7NyohnKHYxpxBa/pub?gid=2048870662&single=true&output=csv";
        const CONF_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV2O8MpV8snD8nUTqLFV2pqu9V86BfmMJcK5CFX50rOc4Xyj8UyqBieK1xNB7KMT7NyohnKHYxpxBa/pub?gid=1511626760&single=true&output=csv";

        let intentos = 0;
        const MAX_INTENTOS = 5;
        let iniciado = false;

        function mostrarError(msg) {
            document.getElementById("productos").innerHTML = `
                <div class="error-box">
                    <strong>Error:</strong> ${msg}
                </div>
            `;
        }

        function aplicarConfigVisual() {
            Papa.parse(CONF_LINK, {
                download: true,
                header: true,
                complete: function(res) {
                    const config = {};

                    res.data.forEach(r => {
                        if (r.clave) config[r.clave.trim()] = (r.valor || "").trim();
                    });

                    // COLOR PRINCIPAL
                    if (config.color_principal) {
                        document.documentElement.style.setProperty("--p-color", config.color_principal);
                    }

                    // FAVICON DINÁMICO
                    if (config.favicon) {
                        document.getElementById("favicon").href = config.favicon;
                    }
                }
            });
        }

        function arrancarTienda() {
            if (iniciado) return;

            if (typeof window.initFocuz === "function") {
                try {
                    iniciado = true;
                    window.initFocuz(PROD_LINK, CONF_LINK);
                } catch (e) {
                    mostrarError("Error iniciando productos");
                }
                return;
            }

            intentos++;
            if (intentos < MAX_INTENTOS) {
                setTimeout(arrancarTienda, 1000);
            } else {
                mostrarError("No cargó el motor");
            }
        }

        // APLICA CONFIG (COLOR + FAVICON aunque falle el engine)
        aplicarConfigVisual();

        window.addEventListener("load", () => {
            setTimeout(arrancarTienda, 300);
        });
    </script>

    <script src="https://rcastro353.github.io/focuz-engine-v1/engine.js"
        onload="arrancarTienda()"
        onerror="mostrarError('No se pudo cargar engine.js')">
    </script>

</body>
</html>
